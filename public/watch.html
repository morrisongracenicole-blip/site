<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch · {{SITE_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0b6bcb;
      --primary-hover: #0958a8;
      --bg: #ffffff;
      --surface: #f7f8fa;
      --text: #111827;
      --muted: #6b7280;
      --stroke: #e5e7eb;
      --danger: #dc2626;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: light; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--stroke);
    }
    .site-header-inner {
      max-width: 1100px; margin: 0 auto; padding: 0.85rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .brand {
      display: flex; align-items: center; gap: 0.6rem; text-decoration: none; color: var(--text);
    }
    .brand-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.7rem; color: #fff; flex-shrink: 0;
    }
    .brand-name { font-weight: 700; font-size: 1.05rem; letter-spacing: -0.02em; }
    .header-actions { display: flex; align-items: center; gap: 0.5rem; }
    .badge-18 {
      font-size: 0.65rem; font-weight: 700;
      padding: 0.28rem 0.5rem; border-radius: 4px;
      background: #fef2f2; color: var(--danger); border: 1px solid #fecaca;
    }
    .nav-link {
      color: var(--text); font-weight: 600; text-decoration: none; font-size: 0.8rem;
      padding: 0.45rem 0.9rem; border-radius: 8px;
      border: 1px solid var(--stroke); background: var(--bg);
    }
    .nav-link:hover { background: var(--surface); }
    .container { max-width: 1100px; margin: 0 auto; padding: 1.25rem; }
    .topbar { margin-bottom: 1.15rem; }
    .topbar a {
      color: var(--text); font-weight: 600; text-decoration: none; font-size: 0.82rem;
      padding: 0.4rem 0.8rem; border-radius: 8px;
      border: 1px solid var(--stroke); background: var(--bg);
      display: inline-block;
    }
    .topbar a:hover { background: var(--surface); }
    .layout { display: grid; gap: 1.25rem; }
    @media (min-width: 960px) {
      .layout { grid-template-columns: 1fr 320px; align-items: start; }
    }
    .player-wrap {
      border-radius: 10px; overflow: hidden;
      background: var(--bg);
      border: 1px solid var(--stroke);
    }
    .player-aspect { position: relative; width: 100%; padding-top: 56.25%; background: #111; }
    .player-aspect video, .player-aspect .skel {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; display: block;
    }
    .skel {
      background: linear-gradient(90deg, #f3f4f6 0%, #e5e7eb 50%, #f3f4f6 100%);
      background-size: 200% 100%; animation: sh 1.2s ease-in-out infinite;
    }
    @keyframes sh { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    .player-meta { padding: 1rem 1.15rem 1.15rem; }
    .player-meta h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .player-meta p { color: var(--muted); font-size: 0.875rem; line-height: 1.55; }
    .chips { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.65rem; }
    .chip {
      font-size: 0.7rem; font-weight: 600; padding: 0.28rem 0.55rem; border-radius: 6px;
      background: #eff6ff; color: var(--primary); border: 1px solid #dbeafe;
    }
    .pay-panel {
      border-radius: 10px;
      background: var(--bg);
      border: 1px solid var(--stroke);
      padding: 1.1rem 1.15rem;
      position: sticky; top: 5rem;
    }
    .pay-panel h2 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.55rem; }
    .pay-price { font-size: 1.6rem; font-weight: 700; color: var(--primary); margin-bottom: 0.85rem; }
    .pay-price small { font-size: 0.8rem; opacity: 0.7; margin-left: 0.15rem; color: var(--muted); font-weight: 500; }
    .pay-section { margin-bottom: 0.9rem; }
    .pay-section-title {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.45rem;
    }
    .btn {
      font-family: inherit; font-weight: 600; font-size: 0.82rem; border-radius: 8px;
      padding: 0.65rem 0.875rem; cursor: pointer; border: 1px solid var(--stroke);
      background: var(--bg); color: var(--text); text-align: center; text-decoration: none;
      display: block; width: 100%;
    }
    .btn:hover { background: var(--surface); }
    .btn-primary {
      background: var(--primary); color: #fff; border-color: var(--primary);
    }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); color: #fff; }
    .btn-telegram {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      background: #229ED9 !important;
      border-color: #229ED9 !important;
      color: #fff !important;
      font-weight: 700;
      margin-top: 0.4rem;
    }
    .btn-telegram:hover {
      background: #1b8fc4 !important;
      border-color: #1b8fc4 !important;
      color: #fff !important;
    }
    .btn-telegram svg { width: 1.05rem; height: 1.05rem; flex-shrink: 0; }
    .nav-telegram {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #fff !important;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.8rem;
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      background: #229ED9;
      border: 1px solid #229ED9;
    }
    .nav-telegram:hover { background: #1b8fc4; border-color: #1b8fc4; }
    .nav-telegram svg { width: 1rem; height: 1rem; flex-shrink: 0; }
    .btn-pay-cta { padding: 0.72rem 1rem !important; }
    .btn-pay-inner {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.5rem; width: 100%;
    }
    .btn-pay-text { font-weight: 700; white-space: nowrap; }
    .pay-receive-note {
      margin-top: 0.55rem;
      font-size: 0.75rem;
      line-height: 1.4;
      color: var(--muted);
      text-align: center;
    }
    .pay-method-icons {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding-left: 0.35rem; border-left: 1px solid rgba(255,255,255,0.35);
    }
    .pay-method-icons svg { height: 1rem; width: auto; flex-shrink: 0; }
    .pay-icon-card { width: 1.3rem !important; }
    .pay-icon-cashapp { width: 1.05rem !important; }
    .crypto-row {
      padding: 0.6rem 0.7rem; margin-bottom: 0.4rem; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--stroke);
    }
    .crypto-row-head { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
    .crypto-label { font-size: 0.78rem; font-weight: 700; }
    .crypto-addr { font-family: ui-monospace, monospace; font-size: 0.65rem; word-break: break-all; color: var(--muted); }
    .btn-copy {
      font-size: 0.65rem; font-weight: 600; padding: 0.25rem 0.5rem; border-radius: 6px;
      border: 1px solid var(--stroke); background: var(--bg); color: var(--text); cursor: pointer;
    }
    .alert {
      padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem;
      background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af;
    }
    .alert.err { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .alert[hidden] { display: none !important; }
    .state-box { text-align: center; padding: 3rem 1.5rem; color: var(--muted); }
    .more-section {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--stroke);
    }
    .more-section[hidden] { display: none !important; }
    .more-head {
      display: flex; align-items: baseline; justify-content: space-between; gap: 1rem;
      margin-bottom: 1rem; flex-wrap: wrap;
    }
    .more-head h2 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    .more-head a {
      font-size: 0.8rem; font-weight: 600; color: var(--primary); text-decoration: none;
    }
    .more-head a:hover { text-decoration: underline; }
    .more-grid {
      display: grid; gap: 0.9rem;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    }
    @media (min-width: 700px) {
      .more-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    }
    .more-card {
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      border: 1px solid var(--stroke); border-radius: 10px; overflow: hidden;
      background: var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .more-card:hover {
      border-color: #c5cad3;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }
    .more-thumb {
      position: relative; width: 100%; padding-top: 56.25%;
      background: var(--surface); overflow: hidden;
    }
    .more-thumb img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .more-thumb-ph {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #9ca3af; font-size: 0.7rem; font-weight: 600;
      background: var(--surface);
    }
    .more-price {
      position: absolute; top: 8px; right: 8px; z-index: 2;
      font-size: 0.7rem; font-weight: 700;
      padding: 0.2rem 0.45rem; border-radius: 5px;
      background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.06);
      color: var(--primary);
    }
    .more-dur {
      position: absolute; bottom: 8px; right: 8px; z-index: 2;
      font-size: 0.62rem; font-weight: 600;
      padding: 0.15rem 0.35rem; border-radius: 4px;
      background: rgba(0,0,0,0.75); color: #fff;
    }
    .more-body { padding: 0.65rem 0.7rem 0.75rem; }
    .more-title {
      font-size: 0.8rem; font-weight: 600; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    footer {
      text-align: center; padding: 1.75rem 1rem;
      font-size: 0.75rem; color: var(--muted);
      border-top: 1px solid var(--stroke);
    }
  </style>
</head>

        <div class="pay-section">

          <button type="button" class="btn btn-primary btn-pay-cta" id="btn-pay-instant">
            <span class="btn-pay-inner">
              <span class="btn-pay-text">Pay and receive</span>
              <span class="pay-method-icons" aria-hidden="true">
                <svg class="pay-icon-apple" viewBox="0 0 50 32" aria-hidden="true"><rect width="50" height="32" rx="5" fill="#fff"/><path d="M13.2 9.8c-.5.6-1.2 1-2 1-.1-.8.3-1.5.7-2 .5-.6 1.3-1 2-.9.1.8-.2 1.5-.7 2.1zm.6 1.1c-1-.1-1.9.6-2.5.6s-1.3-.6-2.2-.6-1.6.6-2.1 1.4c-.9 1.1.6 3.3 1.7 3.4.5 0 .9-.3 1.5-.3s1 .3 1.5.3c.6.1 2.3-1.1 2.4-2.2-1.1-.4-1.9-1.4-1.3-2.6z" fill="#000" transform="translate(1,3)"/><text x="22" y="20" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="600" fill="#000">Pay</text></svg>
                <svg class="pay-icon-card" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>

          <a class="btn btn-telegram" id="btn-contact-tg" href="#" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.788.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>

    </section>
  </div>

  <footer>
    <p>© {{SITE_NAME}} · 18+ only</p>
  </footer>

  <script>
    (function () {
      var EBOOKS_ORIGIN = '{{EBOOKS_SITE_URL}}';
      var TG_ENV = '{{TELEGRAM_USERNAME}}'.replace(/^@/, '').trim();
      var MASKED_PRODUCT_NAME = 'Digital Ebook';
      function pickMaskedName(custom) {
        if (custom && String(custom).trim()) return String(custom).trim();
        return MASKED_PRODUCT_NAME;
      }
      var currentVideo = null;
      var tgUser = TG_ENV;
      var cryptoWallets = [];
      var MORE_LIMIT = 12;

      function normalizeOrigin(u) { try { return new URL(u).origin; } catch (e) { return ''; } }
      function getVideoId() { var p = new URLSearchParams(window.location.search); return (p.get('id') || p.get('video_id') || '').trim(); }
      function formatDuration(d) {
        if (d == null || d === '') return '';
        if (typeof d === 'number' && !isNaN(d)) { var sec = Math.max(0, Math.round(Number(d))); return Math.floor(sec / 60) + 'min ' + (sec % 60) + 's'; }
        var parts = String(d).split(':');
        if (parts.length === 2) {
          var mm = parseInt(parts[0], 10) || 0, ss = Math.round(parseFloat(parts[1]) || 0);
          return mm + 'min ' + ss + 's';
        }
        return String(d);
      }
      function formatViews(v) { v = Number(v) || 0; if (v < 1000) return v + ' views'; if (v < 1e6) return (v / 1000).toFixed(1) + 'K views'; return (v / 1e6).toFixed(1) + 'M views'; }
      async function fetchSigned(fileKey) {
        if (!fileKey) return null;
        var r = await fetch('/api/signed-url?key=' + encodeURIComponent(String(fileKey).trim()));
        if (!r.ok) return null;
        var j = await r.json();
        return j.success && j.url ? j.url : null;
      }
      function watchUrl(id) {
        return '/watch?id=' + encodeURIComponent(String(id || ''));
      }
      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
      }
      function hydrateMoreThumbs() {
        document.querySelectorAll('.more-card[data-thumb-key]').forEach(function (card) {
          var key = card.getAttribute('data-thumb-key');
          var img = card.querySelector('.js-more-img');
          var ph = card.querySelector('.js-more-ph');
          if (!key || !img) return;
          fetchSigned(key).then(function (u) {
            if (!u) return;
            img.onload = function () {
              img.hidden = false;
              if (ph) ph.hidden = true;
            };
            img.onerror = function () {};
            img.src = u;
          });
        });
      }
      function renderMoreVideos(list, excludeId) {
        var section = document.getElementById('more-section');
        var grid = document.getElementById('more-grid');
        if (!section || !grid) return;
        var others = shuffle((list || []).filter(function (v) {
          return v && v.id && String(v.id) !== String(excludeId);
        })).slice(0, MORE_LIMIT);
        if (!others.length) {
          section.hidden = true;
          grid.innerHTML = '';
          return;
        }
        grid.innerHTML = others.map(function (v) {
          var price = Number(v.price) || 0;
          var isFree = !!v.is_free;
          var dur = formatDuration(v.duration);
          var httpPoster = '';
          if (v.thumbnail_url && /^https?:\/\//i.test(String(v.thumbnail_url).trim())) {
            httpPoster = String(v.thumbnail_url).trim();
          }
          var priceLabel = isFree ? 'Free' : ('$' + price.toFixed(2));
          var thumbKey = v.wasabi_thumb_key || '';
          return (
            '<a class="more-card" href="' + escapeAttr(watchUrl(v.id)) + '"' +
              (thumbKey && !httpPoster ? ' data-thumb-key="' + escapeAttr(thumbKey) + '"' : '') + '>' +
              '<div class="more-thumb">' +
                (httpPoster
                  ? '<img src="' + escapeAttr(httpPoster) + '" alt="" loading="lazy">'
                  : '<div class="more-thumb-ph js-more-ph">Video</div><img class="js-more-img" alt="" hidden>') +
                '<span class="more-price">' + escapeHtml(priceLabel) + '</span>' +
                (dur ? '<span class="more-dur">' + escapeHtml(dur) + '</span>' : '') +
              '</div>' +
              '<div class="more-body"><div class="more-title">' + escapeHtml(v.title || 'Untitled') + '</div></div>' +
            '</a>'
          );
        }).join('');
        section.hidden = false;
        hydrateMoreThumbs();
      }
      async function loadMoreVideos(excludeId) {
        try {
          var r = await fetch('/api/videos');
          if (!r.ok) return;
          var pack = await r.json();
          renderMoreVideos(pack.videos || [], excludeId);
        } catch (e) {}
      }
      function ebooksSuccessUrl(price, maskedName, displayTitle, videoId) {
        var origin = normalizeOrigin(String(EBOOKS_ORIGIN || '').trim().replace(/\/+$/, ''));
        if (!origin) return null;
        var masked = pickMaskedName(maskedName);
        var params = new URLSearchParams();
        params.set('status', 'success');
        params.set('product_name', masked);
        if (displayTitle) params.set('display_title', displayTitle);
        params.set('amount', String(price));
        if (videoId) params.set('video_id', String(videoId));
        var tg = (tgUser || TG_ENV || '').replace(/^@/, '').trim();
        if (tg) params.set('telegram_username', tg);
        return origin + '/?' + params.toString();
      }
      function checkoutUrl(price, maskedName, displayTitle, videoId, method) {
        var origin = normalizeOrigin(String(EBOOKS_ORIGIN || '').trim().replace(/\/+$/, ''));
        if (!origin) return null;
        var masked = pickMaskedName(maskedName);
        var successUrl = ebooksSuccessUrl(price, masked, displayTitle || 'Digital purchase', videoId);
        if (!successUrl) return null;
        var p2 = new URLSearchParams();
        p2.set('amount', String(price));
        p2.set('currency', 'USD');
        p2.set('success_url', successUrl);
        p2.set('product_name', masked);
        p2.set('display_title', displayTitle || 'Digital purchase');
        p2.set('method', method || 'whop');
        if (videoId) p2.set('video_id', videoId);
        var tgCheckout = (tgUser || TG_ENV || '').replace(/^@/, '').trim();
        if (tgCheckout) p2.set('telegram_username', tgCheckout);
        var cancelP = new URLSearchParams(p2.toString());
        cancelP.set('payment_canceled', 'true');
        p2.set('cancel_url', origin + '/api/paypal-checkout?' + cancelP.toString());
        return origin + '/api/paypal-checkout?' + p2.toString();
      }
      function tgUrlForVideo(v) {
        var enc = encodeURIComponent('Hi! I want: ' + v.title + '\nPrice: $' + Number(v.price).toFixed(2) + '\nPlease send payment options.');
        return tgUser ? 'https://t.me/' + tgUser + '?text=' + enc : 'https://t.me/share/url?url=&text=' + enc;
      }
      function startCheckout(price, maskedName, displayTitle, videoId, method) {
        var url = checkoutUrl(price, maskedName, displayTitle, videoId, method || 'whop');
        if (!url) {
          alert('Checkout is not configured. Set EBOOKS_SITE_URL or VITE_CHECKOUT_URL.');
          return;
        }
        window.location.href = url;
      }
      function tgUrlCryptoProof(v) {
        var lines = (cryptoWallets || []).map(function (w) { return '• ' + String(w.label || w.symbol || 'Wallet') + ': ' + String(w.address || ''); }).join('\n');
        var enc = encodeURIComponent('Crypto $' + Number(v.price).toFixed(2) + ' — ' + v.title + '\n' + lines + '\nTX hash:');
        return tgUser ? 'https://t.me/' + tgUser + '?text=' + enc : 'https://t.me/share/url?url=&text=' + enc;
      }
      function setErr(t) { var el = document.getElementById('err-banner'); el.textContent = t || ''; el.hidden = !t; }
      function parseUrlParams() {
        var p = new URLSearchParams(window.location.search);
        if (p.get('payment_canceled') === 'true') {
          var b = document.getElementById('pay-cancel');
          b.hidden = false;
          setTimeout(function () { b.hidden = true; p.delete('payment_canceled'); history.replaceState({}, '', window.location.pathname + (p.toString() ? '?' + p.toString() : '')); }, 8000);
        }
      }
      function escapeHtml(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }
      function escapeAttr(s) { return escapeHtml(s).replace(/'/g, '&#39;'); }
      function copyToClipboard(text, btn) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () { if (btn) { btn.textContent = 'Copied'; setTimeout(function () { btn.textContent = 'Copy'; }, 1600); } });
        }
      }
      async function loadPlayer(v) {
        var video = document.getElementById('player-video');
        var skel = document.getElementById('player-skel');
        var url = null;
        if (v.public_video_url && /^https?:\/\//i.test(String(v.public_video_url).trim())) url = String(v.public_video_url).trim();
        else if (v.wasabi_video_key) url = await fetchSigned(v.wasabi_video_key);
        else if (v.playback_url && /^https?:\/\//i.test(v.playback_url)) url = v.playback_url;
        if (!url) { setErr('Could not load video stream.'); return; }
        video.src = url;
        video.hidden = false;
        skel.style.display = 'none';
        video.play().catch(function () {});
        fetch('/api/videos/' + v.id + '/views', { method: 'POST' }).catch(function () {});
      }
      function renderPayPanel(v) {
        if (v.is_free) {
          document.getElementById('pay-panel').innerHTML = '<h2>Free</h2><p style="color:var(--muted);font-size:0.85rem;margin-top:0.35rem">This item is free.</p>' +
            (v.product_link ? '<a class="btn btn-primary" href="' + escapeAttr(v.product_link) + '" target="_blank" rel="noopener" style="margin-top:0.75rem">Open</a>' : '');
          return;
        }
        document.getElementById('v-price').innerHTML = '$' + Number(v.price).toFixed(2) + '<small>USD</small>';
        document.getElementById('btn-contact-tg').href = tgUrlForVideo(v);
        var payBtn = document.getElementById('btn-pay-instant');
        if (payBtn) {
          payBtn.onclick = function () {
            startCheckout(v.price, null, v.title, v.id, 'whop');
          };
        }
        if (cryptoWallets.length) {
          document.getElementById('crypto-section').hidden = false;
          document.getElementById('crypto-list').innerHTML = cryptoWallets.map(function (w) {
            return '<div class="crypto-row"><div class="crypto-row-head"><span class="crypto-label">' + escapeHtml(w.label || w.symbol) + '</span><button type="button" class="btn-copy js-cp" data-addr="' + escapeAttr(w.address) + '">Copy</button></div><div class="crypto-addr">' + escapeHtml(w.address) + '</div></div>';
          }).join('');
          document.getElementById('crypto-list').onclick = function (e) {
            var b = e.target.closest('.js-cp');
            if (b) { e.preventDefault(); copyToClipboard(b.getAttribute('data-addr'), b); }
          };
          document.getElementById('crypto-tg').href = tgUrlCryptoProof(v);
        }
      }
      function showVideo(v) {
        currentVideo = v;
        document.getElementById('loading-state').hidden = true;
        document.getElementById('watch-layout').hidden = false;
        document.title = (v.title || 'Watch') + ' · {{SITE_NAME}}';
        document.getElementById('v-title').textContent = v.title || 'Untitled';
        document.getElementById('v-desc').textContent = v.description || '';
        document.getElementById('v-chips').innerHTML = '<span class="chip">' + escapeHtml(formatViews(v.views)) + '</span>' + (v.duration ? '<span class="chip">' + escapeHtml(formatDuration(v.duration)) + '</span>' : '');
        renderPayPanel(v);
        loadPlayer(v);
        loadMoreVideos(v.id);
      }
      async function boot() {
        parseUrlParams();
        EBOOKS_ORIGIN = normalizeOrigin(EBOOKS_ORIGIN || '');
        if (!EBOOKS_ORIGIN) setErr('Set EBOOKS_SITE_URL or VITE_CHECKOUT_URL for checkout.');
        try {
          var br = await fetch('/api/site-brief').then(function (r) { return r.json(); });
          if (br.telegram_username) tgUser = br.telegram_username.replace(/^@/, '');
          if (Array.isArray(br.crypto_wallets)) cryptoWallets = br.crypto_wallets;
        } catch (e) {}
        var nav = document.getElementById('nav-tg');
        if (tgUser) nav.href = 'https://t.me/' + tgUser;
        else { nav.href = '#'; nav.style.opacity = '0.4'; }
        var id = getVideoId();
        if (!id) { document.getElementById('loading-state').hidden = true; document.getElementById('error-state').hidden = false; return; }
        var res = await fetch('/api/videos/' + encodeURIComponent(id));
        if (!res.ok) { document.getElementById('loading-state').hidden = true; document.getElementById('error-state').hidden = false; return; }
        showVideo((await res.json()).video);
      }
      boot().catch(function (e) {
        document.getElementById('loading-state').hidden = true;
        document.getElementById('error-state').hidden = false;
        setErr((e && e.message) || 'Failed to load');
      });
    })();
  </script>
</body>
</html>
