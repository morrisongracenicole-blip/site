<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SITE_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0b6bcb;
      --primary-hover: #0958a8;
      --bg: #ffffff;
      --surface: #f7f8fa;
      --text: #111827;
      --muted: #6b7280;
      --stroke: #e5e7eb;
      --danger: #dc2626;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: light; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.25rem 2.5rem; }

    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--stroke);
    }
    .site-header-inner {
      max-width: 1200px; margin: 0 auto; padding: 0.85rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .brand {
      display: flex; align-items: center; gap: 0.6rem; text-decoration: none; color: var(--text);
    }
    .brand-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.7rem; color: #fff; flex-shrink: 0;
    }
    .brand-name { font-weight: 700; font-size: 1.05rem; letter-spacing: -0.02em; }
    .header-actions { display: flex; align-items: center; gap: 0.5rem; }
    .badge-18 {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em;
      padding: 0.28rem 0.5rem; border-radius: 4px;
      background: #fef2f2; color: var(--danger); border: 1px solid #fecaca;
    }
    .nav-link {
      color: var(--text); font-weight: 600; text-decoration: none; font-size: 0.8rem;
      padding: 0.45rem 0.9rem; border-radius: 8px;
      border: 1px solid var(--stroke); background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
    }
    .nav-link:hover { border-color: #c5cad3; background: var(--surface); }

    .promo-banner {
      border: 1px solid var(--stroke);
      border-radius: 12px;
      padding: 1.15rem 1.25rem;
      margin: 1.25rem 0 1.5rem;
      background: var(--surface);
    }
    .promo-title {
      font-size: 1.15rem; font-weight: 700; margin-bottom: 0.2rem; letter-spacing: -0.02em;
    }
    .promo-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.85rem; }
    .promo-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .promo-btn {
      border-radius: 8px;
      padding: 0.6rem 1.05rem;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--stroke);
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }
    .promo-btn:hover { background: #f3f4f6; }
    .promo-btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .promo-btn.primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }

    .toolbar {
      display: flex; flex-direction: column; gap: 0.75rem;
      margin: 0 0 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--stroke);
    }
    @media (min-width: 768px) {
      .toolbar { flex-direction: row; align-items: center; justify-content: space-between; }
    }
    .toolbar h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    .toolbar-sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.1rem; }
    .search-wrap { position: relative; width: 100%; max-width: 320px; }
    .search {
      width: 100%; padding: 0.55rem 1rem 0.55rem 2.3rem; border-radius: 8px;
      border: 1px solid var(--stroke); background: var(--bg); color: var(--text);
      font-family: inherit; font-size: 0.875rem;
    }
    .search::placeholder { color: #9ca3af; }
    .search:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(11, 107, 203, 0.12); }
    .search-icon {
      position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .alert {
      display: none; padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem;
      background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af;
    }
    .alert.on { display: block; }
    .alert.err { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .alert:not([hidden]) { display: block; }
    .chip {
      font-size: 0.7rem; font-weight: 600; padding: 0.3rem 0.6rem; border-radius: 6px;
      background: #eff6ff; color: var(--primary); border: 1px solid #dbeafe;
    }

    .grid {
      display: grid; gap: 1.15rem;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }
    @media (min-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }

    .vcard {
      border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
      background: var(--bg);
      border: 1px solid var(--stroke);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .vcard:hover {
      border-color: #c5cad3;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }
    .vcard.ph-card { cursor: default; pointer-events: none; opacity: 0.65; }
    .vcard.ph-card:hover { box-shadow: none; border-color: var(--stroke); }
    .vcard-media {
      position: relative; width: 100%; padding-top: 56.25%;
      background: var(--surface);
    }
    .vcard-media-inner { position: absolute; inset: 0; }
    .vcard-media img, .vcard-media video {
      width: 100%; height: 100%; object-fit: cover; display: block; background: #e5e7eb;
    }
    .skel {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, #f3f4f6 0%, #e5e7eb 50%, #f3f4f6 100%);
      background-size: 200% 100%; animation: sh 1.2s ease-in-out infinite;
    }
    @keyframes sh { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    .preview-hit {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      z-index: 4; text-decoration: none; color: inherit;
      background: transparent;
      transition: background 0.2s;
    }
    .preview-hit[hidden] { display: none !important; }
    .vcard:hover .preview-hit { background: rgba(0,0,0,0.28); }
    .play-circ {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0.9);
      transition: opacity 0.2s, transform 0.2s;
    }
    .vcard:hover .play-circ { opacity: 1; transform: scale(1); }
    .play-tri {
      width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent;
      border-left: 14px solid #fff; margin-left: 3px;
    }
    .grad-over {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 45%);
      z-index: 2;
    }
    .badge-price {
      position: absolute; top: 10px; right: 10px; z-index: 3;
      font-weight: 700; font-size: 0.8rem;
      padding: 0.28rem 0.55rem; border-radius: 6px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0,0,0,0.06);
      color: var(--text);
    }
    .badge-price em { font-style: normal; color: var(--primary); }
    .vcard-ph-free .badge-price { color: var(--primary); }
    .badge-dur {
      position: absolute; bottom: 10px; right: 10px; z-index: 3;
      font-size: 0.68rem; font-weight: 600;
      padding: 0.2rem 0.4rem; border-radius: 4px;
      background: rgba(0,0,0,0.75); color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .vcard-body {
      padding: 0.85rem 0.95rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.45rem;
    }
    .vcard-title {
      font-weight: 600; font-size: 0.875rem; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .vcard-meta {
      display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
      font-size: 0.72rem; color: var(--muted);
    }
    .vcard-meta-item { display: inline-flex; align-items: center; gap: 0.3rem; }
    .vcard-meta svg { flex-shrink: 0; opacity: 0.55; }
    .btn-row { display: flex; gap: 0.4rem; margin-top: 0.15rem; }
    .btn {
      font-family: inherit; font-weight: 600; font-size: 0.78rem; border-radius: 8px;
      padding: 0.5rem 0.7rem; cursor: pointer; border: 1px solid var(--stroke);
      background: var(--bg); color: var(--text); text-align: center; text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      flex: 1;
    }
    .btn:hover { background: var(--surface); }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); color: #fff; }
    .price-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 0.15rem; padding-top: 0.5rem; border-top: 1px solid var(--stroke);
    }
    .price-row-label { font-size: 0.65rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .price-row-amt {
      font-size: 1rem; font-weight: 700; color: var(--primary); font-variant-numeric: tabular-nums;
    }
    .price-row-amt small { font-size: 0.7rem; font-weight: 500; opacity: 0.7; margin-left: 0.1rem; color: var(--muted); }
    .ph-card .vcard-title { color: #9ca3af; font-family: ui-monospace, monospace; font-size: 0.75rem; word-break: break-all; }

    dialog.dlg-modal:not([open]) { display: none !important; }
    dialog.dlg-modal[open] {
      border: none; border-radius: 12px;
      max-width: min(420px, calc(100vw - 2rem));
      width: min(420px, calc(100vw - 2rem));
      max-height: min(90vh, 720px);
      height: fit-content; margin: auto; padding: 0;
      position: fixed; inset: 0; z-index: 2147483647;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--stroke);
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      display: flex; flex-direction: column; overflow: hidden;
    }
    dialog.dlg-modal::backdrop { background: rgba(17, 24, 39, 0.4); }
    body.modal-dlg-open .vcard:not(.ph-card) .preview-hit,
    body.modal-dlg-open .vcard:not(.ph-card) .badge-dur,
    body.modal-dlg-open .vcard:not(.ph-card) .badge-price,
    body.modal-dlg-open .vcard:not(.ph-card) .grad-over {
      visibility: hidden !important; pointer-events: none !important;
    }
    .dlg-h {
      flex-shrink: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.15rem; border-bottom: 1px solid var(--stroke);
    }
    .dlg-h strong { font-size: 0.95rem; font-weight: 700; }
    .dlg-b { padding: 1.1rem 1.15rem 1.2rem; font-size: 0.875rem; color: var(--muted); overflow-y: auto; }
    .dlg-x {
      width: 2rem; height: 2rem; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--stroke);
      color: var(--muted); font-size: 1.15rem; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .dlg-x:hover { color: var(--text); background: #eef0f3; }
    .pay-summary {
      text-align: center; padding: 0.85rem 1rem; margin-bottom: 1rem;
      border-radius: 10px; background: var(--surface); border: 1px solid var(--stroke);
    }
    .pay-summary-title { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-bottom: 0.3rem; }
    .pay-summary-price { font-size: 1.35rem; font-weight: 700; color: var(--primary); }
    .pay-summary-price small { font-size: 0.75rem; font-weight: 500; opacity: 0.65; margin-left: 0.2rem; color: var(--muted); }
    .pay-section { margin-bottom: 1rem; }
    .pay-section:last-child { margin-bottom: 0; }
    .pay-section-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.5rem;
    }
    .btn-block { width: 100%; display: block; box-sizing: border-box; }
    .btn-pay-cta { padding: 0.75rem 1rem !important; }
    .btn-pay-inner {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.5rem; width: 100%;
    }
    .btn-pay-text { font-weight: 700; white-space: nowrap; }
    .pay-method-icons {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding-left: 0.35rem; border-left: 1px solid rgba(255,255,255,0.35);
    }
    .pay-method-icons svg { height: 1rem; width: auto; flex-shrink: 0; }
    .pay-icon-card { width: 1.3rem !important; }
    .pay-icon-cashapp { width: 1.05rem !important; }
    .crypto-row {
      display: flex; flex-direction: column; gap: 0.35rem;
      padding: 0.7rem 0.8rem; margin-bottom: 0.45rem;
      border-radius: 8px; background: var(--surface); border: 1px solid var(--stroke);
    }
    .crypto-row-head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .crypto-label { font-size: 0.8rem; font-weight: 700; color: var(--text); }
    .crypto-addr {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.68rem; word-break: break-all; color: var(--muted);
    }
    .btn-copy {
      flex-shrink: 0; font-family: inherit; font-size: 0.68rem; font-weight: 600;
      padding: 0.25rem 0.5rem; border-radius: 6px;
      border: 1px solid var(--stroke); background: var(--bg); color: var(--text); cursor: pointer;
    }
    .btn-copy:hover { background: #eef0f3; }
    .btn-ghost {
      background: var(--bg) !important; border-color: var(--stroke) !important; color: var(--text) !important;
    }
    .btn-ghost:hover { background: var(--surface) !important; }

    footer {
      text-align: center; padding: 1.75rem 1rem;
      font-size: 0.75rem; color: var(--muted);
      border-top: 1px solid var(--stroke); margin-top: 1rem;
    }

    @media (max-width: 640px) {
      .container { padding: 0 1rem 2rem; }
      .promo-banner { padding: 1rem; margin: 1rem 0 1.15rem; }
      .promo-title { font-size: 1rem; }
      .toolbar h1 { font-size: 1.1rem; }
      .grid { gap: 0.85rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="/">
        <div class="brand-icon">18+</div>
        <span class="brand-name">{{SITE_NAME}}</span>
      </a>
      <div class="header-actions">
        <span class="badge-18">18+</span>
        <a class="nav-link" id="nav-tg" href="#" target="_blank" rel="noopener">Support</a>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="promo-banner">
      <div class="promo-title">All Content — $200</div>
      <div class="promo-sub">Full collection · Instant access after payment</div>
      <div class="promo-actions">
        <button type="button" class="promo-btn primary" id="promo-pay">Buy all — $200</button>
        <a class="promo-btn" id="promo-tg" href="#" target="_blank" rel="noopener">Help</a>
      </div>
    </div>

    <div id="pay-cancel" class="alert" role="status" hidden>Payment cancelled. No charges were made.</div>
    <div id="err-banner" class="alert err" role="alert" hidden></div>

    <div class="toolbar">
      <div>
        <h1 id="grid-heading">Videos</h1>
        <p class="toolbar-sub">Browse and unlock content</p>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
        <span class="chip" id="hydrate-chip" hidden>Loading…</span>
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="search" class="search" id="search" placeholder="Search…" autocomplete="off">
        </div>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <dialog id="dlg-details" class="dlg-modal">
    <div class="dlg-h"><strong id="dlg-d-title">Details</strong><button type="button" class="dlg-x" data-close="d" aria-label="Close">×</button></div>
    <div class="dlg-b" id="dlg-d-body"></div>
  </dialog>

  <dialog id="dlg-pay" class="dlg-modal" aria-labelledby="dlg-pay-heading">
    <div class="dlg-h"><strong id="dlg-pay-heading">Checkout</strong><button type="button" class="dlg-x" data-close="p" aria-label="Close">×</button></div>
    <div class="dlg-b">
      <div class="pay-summary" id="dlg-pay-summary" aria-live="polite"></div>

      <div class="pay-section">
        <div class="pay-section-title">Pay with</div>
        <button type="button" class="btn btn-primary btn-block btn-pay-cta" id="dlg-pay-instant">
          <span class="btn-pay-inner">
            <span class="btn-pay-text">Pay now</span>
            <span class="pay-method-icons" aria-hidden="true">
              <svg class="pay-icon-apple" viewBox="0 0 50 32" aria-hidden="true"><rect width="50" height="32" rx="5" fill="#fff"/><path d="M13.2 9.8c-.5.6-1.2 1-2 1-.1-.8.3-1.5.7-2 .5-.6 1.3-1 2-.9.1.8-.2 1.5-.7 2.1zm.6 1.1c-1-.1-1.9.6-2.5.6s-1.3-.6-2.2-.6-1.6.6-2.1 1.4c-.9 1.1.6 3.3 1.7 3.4.5 0 .9-.3 1.5-.3s1 .3 1.5.3c.6.1 2.3-1.1 2.4-2.2-1.1-.4-1.9-1.4-1.3-2.6z" fill="#000" transform="translate(1,3)"/><text x="22" y="20" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="600" fill="#000">Pay</text></svg>
              <svg class="pay-icon-card" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
              <svg class="pay-icon-cashapp" viewBox="0 0 24 24" aria-hidden="true"><rect width="24" height="24" rx="5" fill="#00D632"/><text x="12" y="16.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#fff">$</text></svg>
            </span>
          </span>
        </button>
      </div>

      <div class="pay-section" id="dlg-pay-crypto-section" hidden>
        <div class="pay-section-title">Crypto</div>
        <div id="dlg-pay-crypto-list"></div>
        <a class="btn btn-block btn-ghost" style="margin-top:0.55rem;padding:0.65rem 1rem;text-decoration:none" id="dlg-pay-crypto-tg" href="#" target="_blank" rel="noopener">Submit payment proof</a>
      </div>
    </div>
  </dialog>

  <footer>
    <p>© {{SITE_NAME}} · 18+ only</p>
  </footer>

  <script>
    (function () {
      var EBOOKS_ORIGIN = '{{EBOOKS_SITE_URL}}';
      var TG_ENV = '{{TELEGRAM_USERNAME}}'.replace(/^@/, '').trim();
      var MASKED_PRODUCT_NAME = 'Digital Ebook';
      function pickMaskedName(custom) {
        if (custom && String(custom).trim()) return String(custom).trim();
        return MASKED_PRODUCT_NAME;
      }

      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
      }

      function orderVideosForGrid(videos) {
        var list = (videos || []).slice();
        if (list.length <= 1) return list;
        var paid = list.filter(function (v) {
          return !v.is_free && Number(v.price) > 0;
        });
        if (!paid.length) return shuffle(list);
        var maxP = paid.reduce(function (m, v) {
          return Math.max(m, Number(v.price) || 0);
        }, 0);
        var top = paid.filter(function (v) {
          return (Number(v.price) || 0) === maxP;
        });
        var first = pickRandom(top.length ? top : paid);
        var rest = list.filter(function (v) { return v.id !== first.id; });
        return [first].concat(shuffle(rest));
      }

      function normalizeOrigin(u) {
        try { return new URL(u).origin; } catch (e) { return ''; }
      }

      function formatDuration(d) {
        if (d == null || d === '') return '';
        if (typeof d === 'number' && !isNaN(d)) {
          var sec = Math.max(0, Math.round(Number(d)));
          var m = Math.floor(sec / 60), s = sec % 60;
          return m + 'min ' + s + 's';
        }
        var parts = String(d).split(':');
        if (parts.length === 2) {
          var mm = parseInt(parts[0], 10) || 0, ss = Math.round(parseFloat(parts[1]) || 0);
          return mm + 'min ' + ss + 's';
        }
        if (parts.length === 3) {
          var h = parseInt(parts[0], 10) || 0, mm2 = parseInt(parts[1], 10) || 0, ss2 = Math.round(parseFloat(parts[2]) || 0);
          return h + 'h ' + mm2 + 'm ' + ss2 + 's';
        }
        return String(d);
      }

      function formatViews(v) {
        v = Number(v) || 0;
        if (v < 1000) return v + ' views';
        if (v < 1e6) return (v / 1000).toFixed(1) + 'K views';
        return (v / 1e6).toFixed(1) + 'M views';
      }

      function formatDateRel(iso) {
        if (!iso) return '';
        var date = new Date(iso), now = new Date();
        var diff = Math.ceil(Math.abs(now - date) / (864e5));
        if (diff <= 1) return 'Yesterday';
        if (diff < 7) return diff + ' days ago';
        if (diff < 30) return Math.floor(diff / 7) + ' weeks ago';
        if (diff < 365) return Math.floor(diff / 30) + ' months ago';
        return Math.floor(diff / 365) + ' years ago';
      }

      async function fetchSigned(fileKey) {
        if (!fileKey) return null;
        var r = await fetch('/api/signed-url?key=' + encodeURIComponent(String(fileKey).trim()));
        if (!r.ok) return null;
        var j = await r.json();
        return j.success && j.url ? j.url : null;
      }

      function ebooksSuccessUrl(price, maskedName, displayTitle, videoId) {
        var origin = normalizeOrigin(String(EBOOKS_ORIGIN || '').trim().replace(/\/+$/, ''));
        if (!origin) return null;
        var masked = pickMaskedName(maskedName);
        var params = new URLSearchParams();
        params.set('status', 'success');
        params.set('product_name', masked);
        if (displayTitle) params.set('display_title', displayTitle);
        params.set('amount', String(price));
        if (videoId) params.set('video_id', String(videoId));
        var tg = (tgUser || TG_ENV || '').replace(/^@/, '').trim();
        if (tg) params.set('telegram_username', tg);
        return origin + '/?' + params.toString();
      }

      function checkoutUrl(price, maskedName, displayTitle, videoId, method) {
        var origin = normalizeOrigin(String(EBOOKS_ORIGIN || '').trim().replace(/\/+$/, ''));
        if (!origin) return null;
        var vid = videoId || '';
        var masked = pickMaskedName(maskedName);
        var successUrl = ebooksSuccessUrl(price, masked, displayTitle || 'Digital purchase', vid);
        if (!successUrl) return null;
        var p2 = new URLSearchParams();
        p2.set('amount', String(price));
        p2.set('currency', 'USD');
        p2.set('success_url', successUrl);
        p2.set('product_name', masked);
        p2.set('display_title', displayTitle || 'Digital purchase');
        p2.set('method', method || 'whop');
        if (vid) p2.set('video_id', vid);
        var tgCheckout = (tgUser || TG_ENV || '').replace(/^@/, '').trim();
        if (tgCheckout) p2.set('telegram_username', tgCheckout);
        var cancelP = new URLSearchParams(p2.toString());
        cancelP.set('payment_canceled', 'true');
        p2.set('cancel_url', origin + '/api/paypal-checkout?' + cancelP.toString());
        return origin + '/api/paypal-checkout?' + p2.toString();
      }

      function watchPageUrl(videoId) {
        return '/watch?id=' + encodeURIComponent(String(videoId || ''));
      }

      function tgUrlForVideo(v, tgUser) {
        var msg =
          'Hi! I want: ' + v.title + '\n' +
          'Price: $' + Number(v.price).toFixed(2) + '\n' +
          'Please send payment options.';
        var enc = encodeURIComponent(msg);
        if (tgUser) return 'https://t.me/' + tgUser + '?text=' + enc;
        return 'https://t.me/share/url?url=&text=' + enc;
      }

      function tgUrlForPromo(tgUser) {
        var msg = 'Hi! I want the All Content offer for $200. Please send payment options.';
        var enc = encodeURIComponent(msg);
        if (tgUser) return 'https://t.me/' + tgUser + '?text=' + enc;
        return 'https://t.me/share/url?url=&text=' + enc;
      }

      function startCheckout(price, maskedName, displayTitle, videoId, method) {
        var url = checkoutUrl(price, maskedName, displayTitle, videoId, method || 'whop');
        if (!url) {
          alert('Checkout is not configured. Set EBOOKS_SITE_URL or VITE_CHECKOUT_URL.');
          return;
        }
        window.location.href = url;
      }

      function startPromoCheckout() {
        var masked = pickMaskedName();
        var origin = normalizeOrigin(String(EBOOKS_ORIGIN || '').trim().replace(/\/+$/, ''));
        if (!origin) {
          alert('Checkout is not configured. Set EBOOKS_SITE_URL or VITE_CHECKOUT_URL.');
          return;
        }
        var amount = 200;
        var displayTitle = 'VIP Access - Full Collection';
        var successParams = new URLSearchParams();
        successParams.set('status', 'success');
        successParams.set('product_name', masked);
        successParams.set('display_title', displayTitle);
        successParams.set('amount', amount.toFixed(2));
        successParams.set('offer_type', 'all_content');
        var tg = (tgUser || TG_ENV || '').replace(/^@/, '').trim();
        if (tg) successParams.set('telegram_username', tg);
        var successUrl = origin + '/?' + successParams.toString();
        var p = new URLSearchParams();
        p.set('amount', amount.toFixed(2));
        p.set('currency', 'USD');
        p.set('success_url', successUrl);
        p.set('product_name', masked);
        p.set('display_title', displayTitle);
        p.set('offer_type', 'all_content');
        p.set('method', 'whop');
        if (tg) p.set('telegram_username', tg);
        var cancelP = new URLSearchParams(p.toString());
        cancelP.set('payment_canceled', 'true');
        p.set('cancel_url', origin + '/api/paypal-checkout?' + cancelP.toString());
        window.location.href = origin + '/api/paypal-checkout?' + p.toString();
      }

      function setErr(t) {
        var el = document.getElementById('err-banner');
        el.textContent = t || '';
        el.hidden = !t;
      }

      function pickRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function parseUrlParams() {
        var p = new URLSearchParams(window.location.search);
        if (p.get('payment_canceled') === 'true') {
          var b = document.getElementById('pay-cancel');
          b.hidden = false;
          setTimeout(function () {
            b.hidden = true;
            p.delete('payment_canceled');
            var qs = p.toString();
            history.replaceState({}, '', window.location.pathname + (qs ? '?' + qs : ''));
          }, 8000);
        }
      }

      var allVideos = [];
      var tgUser = TG_ENV;
      var payTarget = null;
      var payCryptoWallets = [];

      function copyToClipboard(text, btn) {
        text = String(text || '');
        if (btn && !btn.getAttribute('data-label')) {
          btn.setAttribute('data-label', (btn.textContent || 'Copy').trim());
        }
        function done(ok) {
          if (!btn) return;
          btn.textContent = ok ? 'Copied' : 'Copy failed';
          setTimeout(function () {
            btn.textContent = btn.getAttribute('data-label') || 'Copy';
          }, 1600);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () { done(true); }).catch(function () { done(false); });
          return;
        }
        try {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          done(true);
        } catch (e) {
          done(false);
        }
      }

      function tgUrlCryptoProof(v, tgUser, wallets) {
        var lines = (wallets || []).map(function (w) {
          return '• ' + String(w.label || w.symbol || 'Wallet').toUpperCase() + ': ' + String(w.address || '');
        }).join('\n');
        var msg =
          'Crypto $' + Number(v.price).toFixed(2) + ' — ' + v.title + '\n' +
          lines + '\n' +
          'TX hash:';
        var enc = encodeURIComponent(msg);
        if (tgUser) return 'https://t.me/' + tgUser + '?text=' + enc;
        return 'https://t.me/share/url?url=&text=' + enc;
      }

      function filterList(q) {
        q = String(q || '').trim().toLowerCase();
        if (!q) return allVideos;
        return allVideos.filter(function (v) {
          return (v.title || '').toLowerCase().indexOf(q) >= 0 ||
            (v.description || '').toLowerCase().indexOf(q) >= 0;
        });
      }

      function renderGrid(list, isPlaceholder) {
        var g = document.getElementById('grid');
        g.innerHTML = '';
        list.forEach(function (v) {
          var el = document.createElement('article');
          var isFree = !isPlaceholder && !!v.is_free;
          el.className = 'vcard' + (isPlaceholder ? ' ph-card' : '') + (isFree ? ' vcard-ph-free' : '');
          el.dataset.id = v.id;
          if (isPlaceholder) {
            el.innerHTML =
              '<div class="vcard-media"><div class="vcard-media-inner"><div class="skel"></div></div></div>' +
              '<div class="vcard-body"><div class="vcard-title">' + escapeHtml(v.title) + '</div><div class="vcard-meta"><span>Loading…</span></div></div>';
            g.appendChild(el);
            return;
          }

          var price = Number(v.price) || 0;
          isFree = !!v.is_free;
          var dur = formatDuration(v.duration);
          var previewHref = watchPageUrl(v.id);
          var svgEye =
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
          var svgCal =
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>';
          var metaDate = escapeHtml(formatDateRel(v.created_at)) || '—';
          var badgeTop = isFree
            ? '<span class="badge-price">Free</span>'
            : '<span class="badge-price"><em>$</em>' + price.toFixed(2) + '</span>';
          var httpPoster = '';
          if (v.thumbnail_url && /^https?:\/\//i.test(String(v.thumbnail_url).trim())) {
            httpPoster = String(v.thumbnail_url).trim();
          }

          el.innerHTML =
            '<div class="vcard-media">' +
              '<div class="vcard-media-inner js-inner">' +
                '<div class="skel js-skel"></div>' +
                '<img class="js-thumb" alt="" style="display:none" />' +
                '<div class="grad-over"></div>' +
                '<a class="preview-hit" href="' + escapeAttr(previewHref) + '"><div class="play-circ"><div class="play-tri"></div></div></a>' +
                badgeTop +
                (dur ? '<span class="badge-dur">' + escapeHtml(dur) + '</span>' : '') +
              '</div>' +
            '</div>' +
            '<div class="vcard-body">' +
              '<div class="vcard-title">' + escapeHtml(v.title) + '</div>' +
              '<div class="vcard-meta">' +
                '<span class="vcard-meta-item">' + svgEye + formatViews(v.views) + '</span>' +
                '<span class="vcard-meta-item">' + svgCal + metaDate + '</span>' +
              '</div>' +
              '<div class="btn-row">' +
                '<a class="btn" href="' + escapeAttr(previewHref) + '" onclick="event.stopPropagation()">Preview</a>' +
                (isFree && v.product_link
                  ? '<a class="btn btn-primary" href="' + escapeAttr(v.product_link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open</a>'
                  : (!isFree
                    ? '<button type="button" class="btn btn-primary js-payopen">Buy</button>'
                    : '<button type="button" class="btn js-details">Details</button>')) +
              '</div>' +
              (!isFree
                ? '<div class="price-row">' +
                    '<span class="price-row-label">Price</span>' +
                    '<span class="price-row-amt">$' + price.toFixed(2) + '<small>USD</small></span>' +
                  '</div>'
                : '') +
            '</div>';

          el.dataset.httpPoster = httpPoster;
          el.dataset.thumbKey = v.wasabi_thumb_key || '';
          el.setAttribute('aria-label', (v.title || 'Catalog item') + (isFree ? ', free' : ', ' + price.toFixed(2) + ' USD'));

          el.querySelector('.js-details') && el.querySelector('.js-details').addEventListener('click', function (e) {
            e.stopPropagation();
            openDetails(v);
          });
          el.addEventListener('click', function (e) {
            if (e.target.closest('a, button, video')) return;
            openDetails(v);
          });
          var po = el.querySelector('.js-payopen');
          if (po) po.addEventListener('click', function (e) {
            e.stopPropagation();
            startCheckout(v.price, null, v.title, v.id, 'whop');
          });

          g.appendChild(el);
        });

        if (!isPlaceholder) hydrateThumbs();
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
      }
      function escapeAttr(s) { return escapeHtml(s).replace(/'/g, '&#39;'); }

      function hydrateThumbs() {
        document.querySelectorAll('.vcard:not(.ph-card)').forEach(function (card) {
          var skel = card.querySelector('.js-skel');
          var img = card.querySelector('.js-thumb');
          var http = card.dataset.httpPoster;
          function trySignedThumb() {
            var k = card.dataset.thumbKey;
            if (!k) { skel.style.display = 'none'; return; }
            fetchSigned(k).then(function (u) {
              if (!u) { skel.style.display = 'none'; return; }
              img.onload = function () { skel.style.display = 'none'; img.style.display = 'block'; };
              img.onerror = function () { skel.style.display = 'none'; };
              img.src = u;
            });
          }
          if (http) {
            img.onload = function () { skel.style.display = 'none'; img.style.display = 'block'; };
            img.onerror = function () { trySignedThumb(); };
            img.src = http;
            return;
          }
          trySignedThumb();
        });
      }

      function syncModalBodyClass() {
        var d1 = document.getElementById('dlg-details');
        var d2 = document.getElementById('dlg-pay');
        var open = (d1 && d1.open) || (d2 && d2.open);
        document.body.classList.toggle('modal-dlg-open', !!open);
      }

      function openDetails(v) {
        var d = document.getElementById('dlg-details');
        document.body.classList.add('modal-dlg-open');
        document.getElementById('dlg-d-title').textContent = v.title;
        document.getElementById('dlg-d-body').innerHTML =
          '<p style="margin-bottom:0.75rem;line-height:1.55;color:#374151">' + escapeHtml(v.description || 'No description') + '</p>' +
          '<div style="display:flex;flex-wrap:wrap;gap:0.35rem;margin-bottom:0.75rem">' +
          '<span class="chip">' + escapeHtml(formatViews(v.views)) + '</span>' +
          '<span class="chip">' + escapeHtml(formatDateRel(v.created_at)) + '</span>' +
          (v.duration ? '<span class="chip">' + escapeHtml(formatDuration(v.duration)) + '</span>' : '') +
          '</div>' +
          (!v.is_free
            ? '<div class="price-row" style="border-top:none;padding-top:0;margin-top:0;margin-bottom:0.75rem">' +
              '<span class="price-row-label">Price</span>' +
              '<span class="price-row-amt">$' + Number(v.price).toFixed(2) + '<small>USD</small></span>' +
              '</div>'
            : '') +
          '<div style="margin-top:0.5rem;display:flex;gap:0.5rem;flex-wrap:wrap">' +
          '<a class="btn btn-primary" href="' + escapeAttr(watchPageUrl(v.id)) + '">Watch</a>' +
          (!v.is_free ? '<button type="button" class="btn js-dpay">Buy</button>' : '') +
          '<a class="btn" href="' + escapeAttr(tgUrlForVideo(v, tgUser) || '#') + '" target="_blank">Help</a>' +
          '</div>';
        var bp = d.querySelector('.js-dpay');
        if (bp) bp.addEventListener('click', function () { d.close(); openPay(v); });
        d.showModal();
        syncModalBodyClass();
      }

      function openPay(v) {
        payTarget = v;
        document.body.classList.add('modal-dlg-open');
        var sum = document.getElementById('dlg-pay-summary');
        sum.innerHTML =
          '<div class="pay-summary-title">' + escapeHtml(v.title) + '</div>' +
          '<div class="pay-summary-price">$' + Number(v.price).toFixed(2) + '<small>USD</small></div>';

        var sec = document.getElementById('dlg-pay-crypto-section');
        var list = document.getElementById('dlg-pay-crypto-list');
        var tgL = document.getElementById('dlg-pay-crypto-tg');

        if (payCryptoWallets.length) {
          sec.hidden = false;
          list.innerHTML = payCryptoWallets
            .map(function (w) {
              return (
                '<div class="crypto-row">' +
                '<div class="crypto-row-head">' +
                '<span class="crypto-label">' + escapeHtml(w.label || w.symbol || 'Wallet') + '</span>' +
                '<button type="button" class="btn-copy js-cp" data-addr="' + escapeAttr(w.address) + '">Copy</button>' +
                '</div>' +
                '<div class="crypto-addr">' + escapeHtml(w.address) + '</div>' +
                '</div>'
              );
            })
            .join('');
          list.onclick = function (e) {
            var b = e.target.closest('.js-cp');
            if (!b || !list.contains(b)) return;
            e.preventDefault();
            copyToClipboard(b.getAttribute('data-addr'), b);
          };
          tgL.href = tgUrlCryptoProof(v, tgUser, payCryptoWallets);
        } else {
          sec.hidden = true;
          list.innerHTML = '';
          list.onclick = null;
          tgL.href = '#';
        }

        var payBtn = document.getElementById('dlg-pay-instant');
        if (payBtn) {
          payBtn.onclick = function () {
            startCheckout(v.price, null, v.title, v.id, 'whop');
          };
        }

        document.getElementById('dlg-pay').showModal();
        syncModalBodyClass();
      }

      document.getElementById('dlg-details').addEventListener('close', syncModalBodyClass);
      document.getElementById('dlg-pay').addEventListener('close', syncModalBodyClass);
      document.querySelector('#dlg-details .dlg-x').addEventListener('click', function () {
        document.getElementById('dlg-details').close();
      });
      document.querySelector('#dlg-pay .dlg-x').addEventListener('click', function () {
        document.getElementById('dlg-pay').close();
      });
      document.getElementById('search').addEventListener('input', function () {
        renderGrid(filterList(this.value), false);
      });

      async function boot() {
        parseUrlParams();
        EBOOKS_ORIGIN = normalizeOrigin(EBOOKS_ORIGIN || '');
        var hints = [];
        if (!EBOOKS_ORIGIN) hints.push('Set EBOOKS_SITE_URL or VITE_CHECKOUT_URL for checkout redirects.');
        try {
          var hc = await fetch('/api/health').then(function (x) { return x.json(); });
          if (!hc.wasabi_signed_urls) {
            hints.push('Wasabi signing is off — check Wasabi env / site_config.');
          }
        } catch (e2) {}
        if (hints.length) setErr(hints.join(' '));

        try {
          var br = await fetch('/api/site-brief').then(function (r) { return r.json(); });
          if (br.video_list_title) document.getElementById('grid-heading').textContent = br.video_list_title;
          if (br.telegram_username) tgUser = br.telegram_username.replace(/^@/, '');
          if (Array.isArray(br.crypto_wallets)) payCryptoWallets = br.crypto_wallets;
        } catch (e) {}

        var nav = document.getElementById('nav-tg');
        if (tgUser) nav.href = 'https://t.me/' + tgUser;
        else { nav.href = '#'; nav.style.opacity = '0.4'; }
        var promoPay = document.getElementById('promo-pay');
        if (promoPay) promoPay.addEventListener('click', startPromoCheckout);
        var promoTg = document.getElementById('promo-tg');
        if (promoTg) {
          if (tgUser) promoTg.href = tgUrlForPromo(tgUser);
          else { promoTg.href = '#'; promoTg.style.opacity = '0.4'; }
        }

        var idsRes = await fetch('/api/video-ids');
        var idsJs = idsRes.ok ? await idsRes.json() : { ids: [] };
        var ids = shuffle(idsJs.ids || []);
        if (ids.length) {
          renderGrid(ids.map(function (id) { return { id: id, title: id }; }), true);
        }

        document.getElementById('hydrate-chip').hidden = false;
        var vidRes = await fetch('/api/videos');
        document.getElementById('hydrate-chip').hidden = true;
        if (!vidRes.ok) {
          var er = await vidRes.json().catch(function () { return {}; });
          setErr(er.error || 'Failed to load videos');
          return;
        }
        var pack = await vidRes.json();
        allVideos = orderVideosForGrid(pack.videos || []);
        renderGrid(allVideos, false);
      }

      boot().catch(function (e) {
        setErr((e && e.message) || 'Catalog failed to load');
        document.getElementById('hydrate-chip').hidden = true;
      });
    })();
  </script>
</body>
