<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Vídeos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00aff0;
      --primary-deep: #008ecf;
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1e1e1e;
      --card: #181818;
      --text: #fff;
      --muted: #8e8e8e;
      --stroke: rgba(255,255,255,0.08);
      --danger: #ff4757;
      --ok: #2ed573;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
      padding-bottom: 1rem; border-bottom: 1px solid var(--stroke);
    }
    .header h1 { font-size: 1.25rem; font-weight: 700; }
    .header-meta { font-size: 0.8rem; color: var(--muted); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
      padding: 0.55rem 1rem; border-radius: 8px; font-weight: 600; font-size: 0.85rem;
      border: 1px solid var(--stroke); background: var(--surface); color: var(--text);
      cursor: pointer; text-decoration: none; transition: border-color 0.15s, background 0.15s;
    }
    .btn:hover { border-color: var(--primary); }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-deep); border-color: var(--primary-deep); }
    .btn-sm { padding: 0.35rem 0.65rem; font-size: 0.75rem; border-radius: 6px; }
    .btn-ghost { background: transparent; }
    .btn-danger { color: var(--danger); border-color: rgba(255,71,87,0.35); }
    .btn-danger:hover { background: rgba(255,71,87,0.1); }

    .login-box {
      max-width: 400px; margin: 4rem auto; padding: 2rem;
      background: var(--card); border: 1px solid var(--stroke); border-radius: 16px;
    }
    .login-box h1 { font-size: 1.35rem; margin-bottom: 0.35rem; }
    .login-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 0.35rem; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 0.6rem 0.75rem; border-radius: 8px;
      border: 1px solid var(--stroke); background: var(--surface-2); color: var(--text);
      font: inherit; font-size: 0.9rem;
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--primary); }
    .field textarea { min-height: 80px; resize: vertical; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    @media (max-width: 560px) { .field-row { grid-template-columns: 1fr; } }
    .field-check { display: flex; align-items: center; gap: 0.5rem; }
    .field-check input { width: auto; }

    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }

    .table-wrap {
      overflow-x: auto; border: 1px solid var(--stroke); border-radius: 12px;
      background: var(--card);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--stroke); }
    th { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .center { text-align: center; }
    .muted { color: var(--muted); }
    .error-text { color: var(--danger); }
    .actions-cell { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .thumb-cell { width: 72px; padding: 0.5rem !important; }
    .thumb-img {
      width: 56px; height: 36px; object-fit: cover; border-radius: 6px;
      background: var(--surface-2); display: block;
    }
    .thumb-placeholder {
      width: 56px; height: 36px; border-radius: 6px; background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; color: var(--muted);
    }
    .badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px;
      font-size: 0.68rem; font-weight: 700;
    }
    .badge-ok { background: rgba(46,213,115,0.15); color: var(--ok); }
    .badge-off { background: rgba(255,255,255,0.06); color: var(--muted); }

    .editor-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 2rem 1rem; overflow-y: auto;
    }
    .editor-panel {
      width: 100%; max-width: 640px; background: var(--card);
      border: 1px solid var(--stroke); border-radius: 16px; padding: 1.5rem;
    }
    .editor-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .editor-head h2 { font-size: 1.1rem; }
    .upload-block {
      border: 1px dashed var(--stroke); border-radius: 10px;
      padding: 0.85rem; margin-bottom: 1rem; background: var(--surface);
    }
    .upload-block label { font-size: 0.78rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 0.4rem; }
    .upload-status { font-size: 0.75rem; color: var(--muted); margin-top: 0.35rem; word-break: break-all; }
    .form-actions { display: flex; gap: 0.5rem; margin-top: 1.25rem; flex-wrap: wrap; }

    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300;
      padding: 0.75rem 1.1rem; border-radius: 10px; font-size: 0.85rem; font-weight: 500;
      background: var(--surface-2); border: 1px solid var(--stroke);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .toast-error { border-color: rgba(255,71,87,0.5); color: #ff8a95; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div id="login-screen" hidden>
    <div class="login-box">
      <h1>Admin</h1>
      <p>Gestão de vídeos — faça login para continuar.</p>
      <form id="login-form">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required autocomplete="username" placeholder="admin@gmail.com">
        </div>
        <div class="field">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%;margin-top:0.5rem">Entrar</button>
      </form>
    </div>
  </div>

  <div id="dashboard" hidden>
    <div class="wrap">
      <header class="header">
        <div>
          <h1>Painel de Vídeos</h1>
          <p class="header-meta">Sessão: <span id="admin-email"></span> · <a href="/" style="color:var(--primary)">Ver loja</a></p>
        </div>
        <button type="button" class="btn" id="logout-btn">Sair</button>
      </header>

      <div class="toolbar">
        <button type="button" class="btn btn-primary" id="new-video-btn">+ Novo vídeo</button>
        <button type="button" class="btn" id="refresh-btn">Atualizar lista</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th></th>
              <th>Título</th>
              <th>Preço</th>
              <th>Views</th>
              <th>Ordem</th>
              <th>Estado</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="videos-tbody">
            <tr><td colspan="7" class="muted center">A carregar…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="editor-panel" class="editor-overlay" hidden>
    <div class="editor-panel">
      <div class="editor-head">
        <h2 id="editor-title">Novo vídeo</h2>
        <button type="button" class="btn btn-sm" id="close-editor">✕</button>
      </div>

      <form id="video-form">
        <input type="hidden" id="field-id">

        <div class="field">
          <label for="field-title">Título *</label>
          <input type="text" id="field-title" required maxlength="200">
        </div>

        <div class="field">
          <label for="field-description">Descrição</label>
          <textarea id="field-description" rows="3"></textarea>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="field-price">Preço (USD)</label>
            <input type="number" id="field-price" min="0" step="0.01" value="0">
          </div>
          <div class="field">
            <label for="field-duration">Duração</label>
            <input type="text" id="field-duration" placeholder="ex: 12:34">
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="field-sort_order">Ordem na loja</label>
            <input type="number" id="field-sort_order" value="0">
          </div>
          <div class="field field-check" style="align-self:end;padding-bottom:0.6rem">
            <input type="checkbox" id="field-is_active" checked>
            <label for="field-is_active">Ativo na loja</label>
          </div>
        </div>

        <div class="field field-check">
          <input type="checkbox" id="field-is_free">
          <label for="field-is_free">Grátis</label>
        </div>

        <div class="upload-block">
          <label>Ficheiro de vídeo (Wasabi)</label>
          <input type="file" id="pick-video" accept="video/*">
          <input type="hidden" id="field-video_file_id">
          <p class="upload-status" id="upload-video-status"></p>
        </div>

        <div class="upload-block">
          <label>Thumbnail (Wasabi)</label>
          <input type="file" id="pick-thumb" accept="image/*">
          <input type="hidden" id="field-thumbnail_file_id">
          <p class="upload-status" id="upload-thumb-status"></p>
        </div>

        <div class="field">
          <label for="field-product_link">Link do produto (opcional, ex. conteúdo grátis)</label>
          <input type="url" id="field-product_link" placeholder="https://...">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="save-btn">Guardar</button>
          <button type="button" class="btn" id="close-editor-2" onclick="document.getElementById('close-editor').click()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="/js/admin.js"></script>
</body>
</html>
